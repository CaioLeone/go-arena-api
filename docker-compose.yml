services:
  # ===== BACKEND API (Go) =====
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: arena_api

    ports:
      - "8080:8080"

    environment:
      # ===== Database =====
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: arena_user
      DB_PASSWORD: arena_password
      DB_NAME: arena_db
      DB_SSL_MODE: disable

      # ===== Redis =====
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # ===== Server =====
      SERVER_PORT: 8080
      SERVER_ENV: dev

      # ===== JWT =====
      JWT_SECRET: dev-secret-key-DO-NOT-USE-IN-PRODUCTION
      JWT_ACCESS_EXPIRATION_MINUTES: 15
      JWT_REFRESH_EXPIRATION_DAYS: 7

      # ===== CORS =====
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - arena_network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== DATABASE (PostgreSQL) =====
  postgres:
    image: postgres:16-alpine

    container_name: arena_postgres

    environment:
      POSTGRES_USER: arena_user
      POSTGRES_PASSWORD: arena_password
      POSTGRES_DB: arena_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - arena_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena_user -d arena_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== CACHE (Redis) =====
  redis:
    image: redis:7-alpine

    container_name: arena_redis

    ports:
      - "6379:6379"

    networks:
      - arena_network

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  arena_network:
    driver: bridge